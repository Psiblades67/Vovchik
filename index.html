<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YouTube Preview Card</title>
  <style>
    body {
      background: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .card {
      width: 320px;
      border-radius: 16px;
      overflow: hidden;
      background: #1e293b;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      transition: transform 0.3s ease;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .thumbnail {
      position: relative;
    }

    .thumbnail img {
      width: 100%;
      display: block;
    }

    .play-btn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255, 0, 0, 0.8);
      border-radius: 50%;
      padding: 15px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .play-btn:hover {
      background: rgba(255, 0, 0, 1);
    }

    .play-btn::after {
      content: '';
      border-style: solid;
      border-width: 10px 0 10px 16px;
      border-color: transparent transparent transparent white;
      display: block;
      margin-left: 4px;
    }

    .content {
      padding: 15px;
      color: #e2e8f0;
    }

    .title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .channel {
      font-size: 13px;
      color: #94a3b8;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="thumbnail">
    <!-- Replace VIDEO_ID -->
    <img src="https://img.youtube.com/vi/VIDEO_ID/maxresdefault.jpg" alt="Thumbnail">
    
    <a href="https://www.youtube.com/watch?v=VIDEO_ID" target="_blank">
      <div class="play-btn"></div>
    </a>
  </div>

  <div class="content">
    <div class="title">Your Video Title</div>
    <div class="channel">Channel Name</div>
  </div>
</div>

</body>
</html>
