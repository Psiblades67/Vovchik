<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Animated YouTube Card</title>

<style>
body {
  background: linear-gradient(135deg, #0f172a, #020617);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
}

/* CARD */
.card {
  width: 340px;
  border-radius: 18px;
  overflow: hidden;
  background: rgba(30, 41, 59, 0.6);
  backdrop-filter: blur(10px);
  box-shadow: 0 20px 50px rgba(0,0,0,0.6);
  transform: translateY(40px) scale(0.9);
  opacity: 0;
  animation: appear 1s ease forwards;
}

@keyframes appear {
  to {
    transform: translateY(0) scale(1);
    opacity: 1;
  }
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 25px 60px rgba(255,0,0,0.4);
}

/* THUMBNAIL */
.thumbnail {
  position: relative;
  cursor: pointer;
}

.thumbnail img {
  width: 100%;
  display: block;
}

/* PLAY BUTTON */
.play {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(1);
  background: rgba(255,0,0,0.8);
  border-radius: 50%;
  padding: 18px;
  transition: 0.3s;
}

.play::after {
  content: '';
  border-style: solid;
  border-width: 12px 0 12px 18px;
  border-color: transparent transparent transparent white;
  display: block;
}

.thumbnail:hover .play {
  transform: translate(-50%, -50%) scale(1.2);
  background: red;
}

/* CONTENT */
.content {
  padding: 15px;
}

.title {
  font-size: 16px;
  font-weight: bold;
}

.channel {
  font-size: 13px;
  color: #94a3b8;
}

/* MODAL */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 0;
  pointer-events: none;
  transition: 0.4s;
}

.modal.active {
  opacity: 1;
  pointer-events: all;
}

.video-box {
  width: 80%;
  max-width: 800px;
  transform: scale(0.7);
  transition: 0.4s;
}

.modal.active .video-box {
  transform: scale(1);
}

iframe {
  width: 100%;
  height: 450px;
  border-radius: 12px;
}
</style>
</head>

<body>

<div class="card">
  <div class="thumbnail" onclick="openVideo()">
    <img id="thumb">
    <div class="play"></div>
  </div>
  <div class="content">
    <div class="title" id="title">Loading...</div>
    <div class="channel">YouTube Video</div>
  </div>
</div>

<!-- MODAL -->
<div class="modal" id="modal" onclick="closeVideo()">
  <div class="video-box">
    <iframe id="player" src="" allowfullscreen></iframe>
  </div>
</div>

<script>
// 🔗 PUT YOUR YOUTUBE LINK HERE
const url = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";

// Extract video ID
const videoId = url.split("v=")[1]?.split("&")[0];

// Set thumbnail
document.getElementById("thumb").src =
  `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`;

// Fetch title using oEmbed (no API key needed)
fetch(`https://www.youtube.com/oembed?url=${url}&format=json`)
  .then(res => res.json())
  .then(data => {
    document.getElementById("title").innerText = data.title;
  });

// OPEN VIDEO
function openVideo() {
  document.getElementById("modal").classList.add("active");
  document.getElementById("player").src =
    `https://www.youtube.com/embed/${videoId}?autoplay=1`;
}

// CLOSE VIDEO
function closeVideo() {
  document.getElementById("modal").classList.remove("active");
  document.getElementById("player").src = "";
}
</script>

</body>
</html>
